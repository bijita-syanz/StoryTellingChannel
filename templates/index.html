<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryTelling Input</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #00ff88;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: rgba(10, 14, 39, 0.9);
            border: 2px solid #00ff88;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            color: #00ff88;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        textarea {
            width: 100%;
            min-height: 200px;
            padding: 10px;
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid #00ff88;
            border-radius: 5px;
            color: #00ff88;
            font-family: Arial, sans-serif;
            font-size: 14px;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            background: rgba(0, 255, 136, 0.1);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        button {
            padding: 10px 20px;
            font-size: 14px;
            border: 2px solid #00ff88;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: rgba(0, 255, 136, 0.2);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        select {
            width: 100%;
            padding: 8px;
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid #00ff88;
            border-radius: 5px;
            color: #00ff88;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:focus {
            outline: none;
            background: rgba(0, 255, 136, 0.1);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        option {
            background: #1a1a3e;
            color: #00ff88;
        }

        .message {
            text-align: center;
            color: #00ff88;
            margin-top: 15px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Story Input</h1>
        
        <form method="POST" action="/submit">
            <div style="margin-bottom: 15px;">
                <label for="language" style="display: block; margin-bottom: 8px; color: #00ff88;">Choose Language:</label>
                <select name="language" id="language" style="width: 100%; padding: 8px; background: rgba(0, 255, 136, 0.05); border: 1px solid #00ff88; border-radius: 5px; color: #00ff88; font-size: 14px;">
                    <option value="english">English</option>
                    <option value="arabic">العربية (Arabic)</option>
                </select>
            </div>
            
            <textarea 
                name="text" 
                placeholder="Enter your story..."
                required
            ></textarea>
            <button type="submit">Submit</button>
        </form>

        {% if message %}
            <div class="message">{{ message }}</div>
        {% endif %}
    </div>
</body>
</html>
